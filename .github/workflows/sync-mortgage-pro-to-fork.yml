# Sync apps/mortgage-pro → dineshreddymeka/mortgage-pro and trigger Pages deploy.
# Requires repo secret MORTGAGE_PRO_TOKEN: a PAT (fine-grained or classic) with
# Contents: Read/Write and Pages: Write on dineshreddymeka/mortgage-pro.

name: Sync Property Pro to fork Pages

on:
  workflow_dispatch:
  push:
    branches: ["master", "main"]
    paths:
      - "apps/mortgage-pro/**"
      - ".github/workflows/sync-mortgage-pro-to-fork.yml"

concurrency:
  group: sync-mortgage-pro-fork
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require MORTGAGE_PRO_TOKEN
        env:
          MORTGAGE_PRO_TOKEN: ${{ secrets.MORTGAGE_PRO_TOKEN }}
        run: |
          if [ -z "${MORTGAGE_PRO_TOKEN}" ]; then
            echo "::error::Add repository secret MORTGAGE_PRO_TOKEN (PAT with Contents+Pages write on dineshreddymeka/mortgage-pro), then re-run."
            exit 1
          fi

      - name: Push apps/mortgage-pro to fork main
        env:
          MORTGAGE_PRO_TOKEN: ${{ secrets.MORTGAGE_PRO_TOKEN }}
        run: |
          set -euo pipefail
          WORK="$(mktemp -d)"
          git clone --depth 1 "https://x-access-token:${MORTGAGE_PRO_TOKEN}@github.com/dineshreddymeka/mortgage-pro.git" "$WORK"
          # Replace tracked tree with apps/mortgage-pro (keep .git)
          find "$WORK" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          tar -C apps/mortgage-pro \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.dev-server.pid' \
            --exclude='.dev-server.log' \
            -cf - . | tar -C "$WORK" -xf -
          cd "$WORK"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No content changes to sync."
          else
            git commit -m "chore: sync Property Pro from agent-marko-hermes (GitHub Pages)"
            git push origin HEAD:main
          fi

      - name: Enable Pages (GitHub Actions) and deploy
        env:
          MORTGAGE_PRO_TOKEN: ${{ secrets.MORTGAGE_PRO_TOKEN }}
          GH_TOKEN: ${{ secrets.MORTGAGE_PRO_TOKEN }}
        run: |
          set -euo pipefail
          if gh api repos/dineshreddymeka/mortgage-pro/pages >/dev/null 2>&1; then
            gh api -X PUT repos/dineshreddymeka/mortgage-pro/pages -f build_type=workflow || true
          else
            gh api -X POST repos/dineshreddymeka/mortgage-pro/pages -f build_type=workflow || true
          fi
          gh workflow run "Deploy to GitHub Pages" --repo dineshreddymeka/mortgage-pro --ref main
          echo "Triggered deploy. Live URL: https://dineshreddymeka.github.io/mortgage-pro/"
