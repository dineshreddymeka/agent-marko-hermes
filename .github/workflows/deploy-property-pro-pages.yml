# Build apps/mortgage-pro and publish to the gh-pages branch.
# After the first run, set Settings → Pages → Deploy from a branch → gh-pages / (root)
# Live (this repo): https://dineshreddymeka.github.io/agent-marko-hermes/
#
# Preferred fork URL https://dineshreddymeka.github.io/mortgage-pro/ uses
# sync-mortgage-pro-to-fork.yml + secret MORTGAGE_PRO_TOKEN.

name: Deploy Property Pro Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - "apps/mortgage-pro/**"
      - ".github/workflows/deploy-property-pro-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: property-pro-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/mortgage-pro/package-lock.json

      - name: Install and build Property Pro
        working-directory: apps/mortgage-pro
        run: npm ci && npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/mortgage-pro/dist
          force_orphan: true
          enable_jekyll: false
